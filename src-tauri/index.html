<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" >
    <title>Document</title>
</head>
<body>

    <!-- Login Container -->
    <div class="auth-container" id="loginContainer">
        <div class="auth-box">
            <div class="auth-header">
        <img src="IMG/Logo Ccapi-Photoroom.png" alt="CCAPI" style="width: 80px; height: auto; margin-bottom: 1rem;">
                <h1>Sistema CCAPI</h1>
                <p>Sistema de Gestão</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Sua senha" required>
                </div>
                <div class="error-message" id="loginErrorMessage"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Entrar</button>
            </form>
            <div class="auth-link">
                <p>Não tem conta? <a href="#" id="showRegisterForm">Cadastre-se</a></p>
            </div>
        </div>
    </div>

</body>
</html>
